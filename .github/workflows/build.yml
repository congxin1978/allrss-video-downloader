name: 构建桌面 APP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install pyinstaller customtkinter feedparser requests yt-dlp pillow beautifulsoup4 lxml

      - name: 生成 .icns
        run: |
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os
          def make_frame(size):
              S=size; img=Image.new("RGBA",(S,S),(0,0,0,0)); d=ImageDraw.Draw(img)
              pad=max(int(S*.04),1); r=max(int(S*.22),1)
              d.rounded_rectangle([pad,pad,S-pad,S-pad],radius=r,fill=(18,24,42))
              cx,cy=S//2,S//2
              for i in range(18,0,-1):
                  fr=i/18; ring=max(int(S*.36),2); inner=max(ring-int(S*.055),1)
                  rc=int(60+(79-60)*(1-fr)); gc=int(80+(130-80)*(1-fr)); bc=int(220+(247-220)*(1-fr))
                  d.ellipse([cx-ring,cy-ring,cx+ring,cy+ring],fill=(rc,gc,bc))
                  d.ellipse([cx-inner,cy-inner,cx+inner,cy+inner],fill=(18,24,42))
              aw=max(int(S*.13),2); ash=max(int(S*.18),2); hw=max(int(S*.26),2)
              ht=max(int(S*.14),2); lh=max(int(S*.04),1); lw=max(int(S*.30),2)
              gap=max(int(S*.03),1); ac=(100,180,255); sx=cx-aw//2; sy=cy-(ash+ht)//2
              d.rectangle([sx,sy,sx+aw,sy+ash],fill=ac)
              ty=sy+ash+ht
              d.polygon([(cx,ty),(cx-hw//2,sy+ash),(cx+hw//2,sy+ash)],fill=ac)
              ly=ty+gap
              d.rounded_rectangle([cx-lw//2,ly,cx+lw//2,ly+lh],radius=lh//2,fill=ac)
              dr=max(int(S*.06),1); dx=max(int(S*.72),1); dy=max(int(S*.18),1)
              d.ellipse([dx-dr,dy-dr,dx+dr,dy+dr],fill=(255,90,90))
              return img
          os.makedirs("assets/icon.iconset",exist_ok=True)
          spec=[(16,'16x16'),(32,'16x16@2x'),(32,'32x32'),(64,'32x32@2x'),
                (128,'128x128'),(256,'128x128@2x'),(256,'256x256'),
                (512,'256x256@2x'),(512,'512x512'),(1024,'512x512@2x')]
          master=make_frame(1024)
          for sz,name in spec:
              master.resize((sz,sz),Image.LANCZOS).save(f"assets/icon.iconset/icon_{name}.png")
          os.system("iconutil -c icns assets/icon.iconset -o assets/icon.icns")
          print("icns done")
          PYEOF

      - name: 打包 APP
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "allrss下载器" \
            --icon assets/icon.icns \
            --collect-all customtkinter \
            --collect-all yt_dlp \
            --collect-all bs4 \
            --collect-all lxml \
            gui_app.py
      - name: 压缩
        run: cd dist && zip -r allrss-Mac.zip "allrss下载器.app"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/allrss-Mac.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install pyinstaller customtkinter feedparser requests yt-dlp beautifulsoup4 lxml

      - name: 打包（文件夹模式，避免误报）
        run: |
          pyinstaller `
            --onedir `
            --windowed `
            --name "allrss下载器" `
            --icon assets\icon.ico `
            --collect-all customtkinter `
            --collect-all yt_dlp `
            --collect-all bs4 `
            --collect-all lxml `
            --noupx `
            gui_app.py

      - name: 压缩为 zip
        run: |
          cd dist
          powershell Compress-Archive -Path "allrss下载器" -DestinationPath "allrss-Win.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: win-app
          path: dist/allrss-Win.zip

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "allrss 下载器"
          body: |
            ## 下载

            | 系统 | 文件 | 说明 |
            |------|------|------|
            | Windows | `allrss-Win.zip` | 解压 → 双击里面的 allrss下载器.exe |
            | Mac | `allrss-Mac.zip` | 解压 → 双击 .app |

            > **Windows 杀毒误报处理**：解压后右键 allrss下载器.exe → 属性 → 底部勾选"解除锁定"→ 确定
            >
            > **Mac 首次打开**：右键 → 打开（跳过安全提示）
          files: |
            mac-app/allrss-Mac.zip
            win-app/allrss-Win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
